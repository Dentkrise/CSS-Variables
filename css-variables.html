<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Variables</title>


  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    body{
      background-color: rgb(39, 49, 78);
      color: white;

      min-height: 100vh;
      margin: 0px;

      font-family: 'Roboto', 'Times New Roman', Times, serif;
    }

    .big-text{
      font-size: 80px;
      text-align: center;
    }

    .text-hint{
      font-size: 50px;
    }

    :root{
    --base: #ffc600;
    --spacing: 10px;
    --blur: 10px;
    }

    img{
      background: var(--base);
      padding: var(--spacing);
      filter: blur(var(--blur));
    }


    .hl{
      color: var(--base);
    }

  </style>
</head>
<body>
  <div class="controls">
  <h2 class="big-text">Update CSS Variables with <span class="hl">JS</span></h2>

  <label class="text-hint" for="spacing">Spacing:</label>
  <input id="spacing" type="range" name="spacing" data-sizing="px" min="10" value="10" max="200">

  <label class="text-hint" for="blur">Blur:</label>
  <input id="blur" type="range" name="blur" data-sizing="px" min="0" value="10" max="25">

  <label class="text-hint" for="base">Base Color</label>
  <input id="base" name="base" type="color" value="#ffc600">
  </div>

  <img src="Images/photo_2026-04-28_17-38-11.jpg">


  <script>
    const inputs = document.querySelectorAll('.controls input');

    function handleUpdate(){
      const suffix = this.dataset.sizing || '';
      document.documentElement.style.setProperty(`--${this.name}`, this.value + suffix);
    }

    inputs.forEach(input => input.addEventListener('change', handleUpdate));
    inputs.forEach(input => input.addEventListener('mousemove', handleUpdate));
  </script>
</body>
</html>
